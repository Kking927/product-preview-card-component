<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
  <title>Product Preview Card Component</title>
</head>

<body>

  <article class="product-card">

    <picture class="product-card__image">
      <source srcset="images/image-product-desktop.jpg" media="(min-width: 600px)">
      <img src="images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum bottle surrounded by green leaves">
    </picture>

    <div class="product-content">
      <span class="product-category">Perfume</span>
      <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>
      <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

      <div class="price-wrapper">
        <span class="price-current">$149.99</span>
        <span class="price-old"><del>$169.99</del></span>
      </div>

      <button class="add-to-cart-btn">
        <img src="images/icon-cart.svg" alt="" aria-hidden="true">
        Add to Cart
      </button>
    </div>

  </article>
</body>

</html>
